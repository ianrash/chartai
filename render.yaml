services:
  # Backend FastAPI Service
  - type: web
    name: chartai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        value: "AIzaSyBj6VlHmbjUMvlqnJlLC3DaHDpfUK4-WJg"
      - key: ALLOWED_ORIGINS
        value: "*"

  # Frontend Vite Static Site
  - type: web
    name: chartai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://chartai-backend.onrender.com"