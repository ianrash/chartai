services:
  - type: web
    name: chartai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        value: "AIzaSyC8wo_Zk-5ALR3nm-Dk8-n0t2SPTEtblzw"
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: chartai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --port $PORT --host 0.0.0.0
    envVars:
      - key: VITE_API_URL
        value: "https://chartai-backend.onrender.com"